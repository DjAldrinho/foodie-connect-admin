<div class="feature-flags">
  <div class="settings-header">
    <h2>Feature Flags</h2>
    <p class="subtitle">Enable/disable features and control rollout</p>
  </div>

  @if (isLoading()) {
    <div class="loading-state"><div class="spinner"></div></div>
  } @else {
    <div class="flags-list">
      @for (flag of featureFlags(); track flag.id) {
        <div class="flag-card">
          <div class="flag-info">
            <div class="flag-header">
              <h3>{{ flag.name }}</h3>
              <label class="toggle-switch">
                <input
                  type="checkbox"
                  [checked]="flag.enabled"
                  (change)="toggleFlag(flag)"
                  [disabled]="isUpdating()"
                />
                <span class="slider"></span>
              </label>
            </div>
            <p class="flag-description">{{ flag.description }}</p>
          </div>
          <div class="flag-rollout">
            <label>Rollout: {{ flag.rolloutPercentage }}%</label>
            <input
              type="range"
              min="0"
              max="100"
              [value]="flag.rolloutPercentage"
              (input)="updateRollout(flag, +$any($event.target).value)"
              [disabled]="isUpdating()"
              class="rollout-slider"
            />
          </div>
        </div>
      }
    </div>
  }
</div>
