<div class="site-settings">
  <div class="settings-header">
    <h2>Site Settings</h2>
    <p class="subtitle">Configure your site's basic information</p>
  </div>

  @if (isLoading()) {
    <div class="loading-state"><div class="spinner"></div></div>
  } @else {
    <form (submit)="saveSettings()" class="settings-form">
      <div class="form-group">
        <label for="siteName">Site Name</label>
        <input
          id="siteName"
          type="text"
          class="form-control"
          [value]="siteName()"
          (input)="siteName.set($any($event.target).value)"
          required
        />
      </div>

      <div class="form-group">
        <label for="siteDescription">Site Description</label>
        <textarea
          id="siteDescription"
          class="form-control"
          rows="4"
          [value]="siteDescription()"
          (input)="siteDescription.set($any($event.target).value)"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="contactEmail">Contact Email</label>
        <input
          id="contactEmail"
          type="email"
          class="form-control"
          [value]="contactEmail()"
          (input)="contactEmail.set($any($event.target).value)"
          required
        />
      </div>

      <div class="form-group">
        <div class="toggle-wrapper">
          <label for="maintenanceMode">Maintenance Mode</label>
          <label class="toggle-switch">
            <input
              id="maintenanceMode"
              type="checkbox"
              [checked]="maintenanceMode()"
              (change)="maintenanceMode.set($any($event.target).checked)"
            />
            <span class="slider"></span>
          </label>
        </div>
        <small class="text-muted">
          When enabled, the site will show a maintenance page to all non-admin users
        </small>
      </div>

      <div class="form-actions">
        @if (saveSuccess()) {
          <span class="success-message">✓ Settings saved successfully</span>
        }
        <button type="submit" class="btn btn-primary" [disabled]="isSaving()">
          @if (isSaving()) {
            <span class="spinner-small"></span>
          }
          {{ isSaving() ? 'Saving...' : 'Save Settings' }}
        </button>
      </div>
    </form>
  }
</div>
