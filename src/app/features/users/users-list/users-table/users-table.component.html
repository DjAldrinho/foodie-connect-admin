<div class="users-table-container">
  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Loading users...</p>
    </div>
  } @else if (users().length === 0) {
    <app-empty-state
      title="No users found"
      description="Try adjusting your filters or check back later"
      icon="group_off"
    >
    </app-empty-state>
  } @else {
    <table mat-table [dataSource]="users()" class="users-table">
      <!-- Checkbox column header -->
      <ng-container matColumnDef="select">
        <th mat-header-cell *matHeaderCellDef>
          <mat-checkbox
            [checked]="isAllSelected()"
            [indeterminate]="isSomeSelected()"
            (change)="toggleAll($event)"
            aria-label="Select all users"
          >
          </mat-checkbox>
        </th>
        <td mat-cell *matCellDef="let user"></td>
      </ng-container>

      <!-- User column header -->
      <ng-container matColumnDef="user">
        <th mat-header-cell *matHeaderCellDef class="sortable-header" (click)="onSort('fullName')">
          User
          <mat-icon>sort</mat-icon>
        </th>
      </ng-container>

      <!-- Role column header -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef class="sortable-header" (click)="onSort('role')">
          Role
          <mat-icon>sort</mat-icon>
        </th>
      </ng-container>

      <!-- Status column header -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef class="sortable-header" (click)="onSort('status')">
          Status
          <mat-icon>sort</mat-icon>
        </th>
      </ng-container>

      <!-- Created date column header -->
      <ng-container matColumnDef="created">
        <th mat-header-cell *matHeaderCellDef class="sortable-header" (click)="onSort('createdAt')">
          Created
          <mat-icon>sort</mat-icon>
        </th>
      </ng-container>

      <!-- Last login column header -->
      <ng-container matColumnDef="lastLogin">
        <th mat-header-cell *matHeaderCellDef class="sortable-header" (click)="onSort('lastLoginAt')">
          Last Login
          <mat-icon>sort</mat-icon>
        </th>
      </ng-container>

      <!-- Actions column header -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>
          <span class="sr-only">Actions</span>
        </th>
      </ng-container>

      <!-- Data rows -->
      <tr
        mat-row
        *matRowDef="let user; trackBy: trackUser"
        app-user-row
        [user]="user"
        [selected]="isSelected(user)"
        (selectionToggle)="toggleSelection(user.id)"
        (view)="view.emit($event)"
        (editRole)="editRole.emit($event)"
        (deactivate)="deactivate.emit($event)"
        (delete)="delete.emit($event)"
      >
      </tr>
    </table>
  }
</div>
