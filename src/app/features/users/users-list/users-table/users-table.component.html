<div class="users-table-container">
  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
      <p>Loading users...</p>
    </div>
  } @else if (users().length === 0) {
    <app-empty-state
      title="No users found"
      description="Try adjusting your filters or check back later"
      icon="group_off"
    >
    </app-empty-state>
  } @else {
    <cdk-virtual-scroll-viewport
      [itemSize]="rowHeight"
      [minBufferPx]="500"
      [maxBufferPx]="1000"
      class="users-table-viewport"
    >
      <!-- Sticky Header -->
      <div class="table-header sticky-header">
        <div class="header-cell select-cell">
          <mat-checkbox
            [checked]="isAllSelected()"
            [indeterminate]="isSomeSelected()"
            (change)="toggleAll($event)"
            aria-label="Select all users"
          >
          </mat-checkbox>
        </div>
        <div class="header-cell sortable-header" (click)="onSort('fullName')">
          User
          <mat-icon class="sort-icon">sort</mat-icon>
        </div>
        <div class="header-cell sortable-header" (click)="onSort('role')">
          Role
          <mat-icon class="sort-icon">sort</mat-icon>
        </div>
        <div class="header-cell sortable-header" (click)="onSort('status')">
          Status
          <mat-icon class="sort-icon">sort</mat-icon>
        </div>
        <div class="header-cell sortable-header" (click)="onSort('createdAt')">
          Created
          <mat-icon class="sort-icon">sort</mat-icon>
        </div>
        <div class="header-cell sortable-header" (click)="onSort('lastLoginAt')">
          Last Login
          <mat-icon class="sort-icon">sort</mat-icon>
        </div>
        <div class="header-cell actions-cell">
          <span class="sr-only">Actions</span>
        </div>
      </div>

      <!-- Virtual Scroll Rows -->
      <div
        *cdkVirtualFor="let user of users(); trackBy: trackUser"
        class="table-row"
        [class.selected]="isSelected(user)"
        app-user-row
        [user]="user"
        [selected]="isSelected(user)"
        (selectionToggle)="toggleSelection(user.id)"
        (view)="view.emit($event)"
        (editRole)="editRole.emit($event)"
        (deactivate)="deactivate.emit($event)"
        (delete)="delete.emit($event)"
      >
      </div>
    </cdk-virtual-scroll-viewport>
  }
</div>
