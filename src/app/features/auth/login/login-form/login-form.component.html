<form (submit)="onSubmit($event)" (keydown.enter)="onKeyPress($event)" class="login-form" novalidate>
  <!-- Email Input -->
  <app-input
    type="email"
    label="Email"
    placeholder="tu@email.com"
    [required]="true"
    prefixIcon="email"
    [(value)]="email"
    (blur)="onEmailBlur()"
  >
  </app-input>

  <!-- Password Input -->
  <app-input
    type="password"
    label="Contraseña"
    placeholder="•••••••••"
    [required]="true"
    prefixIcon="lock"
    [(value)]="password"
    (blur)="onPasswordBlur()"
  >
  </app-input>

  <!-- Remember Me Checkbox -->
  <div class="form-row">
    <label class="checkbox-label">
      <input
        type="checkbox"
        [checked]="rememberMe()"
        (change)="rememberMe.set($event.target.checked)"
        class="checkbox"
      />
      <span>Recordarme</span>
    </label>
  </div>

  <!-- Server Error -->
  @if (serverError()) {
    <div class="server-error" role="alert" aria-live="assertive">
      <mat-icon>error_outline</mat-icon>
      <p>{{ serverError() }}</p>
    </div>
  }

  <!-- Submit Button -->
  <app-button
    variant="primary"
    size="large"
    [loading]="isLoading()"
    [disabled]="!isFormValid()"
    (click)="onSubmit()"
    class="submit-btn"
  >
    {{ isLoading() ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
  </app-button>
</form>
