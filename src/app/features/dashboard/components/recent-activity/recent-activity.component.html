<div class="recent-activity">
  <!-- Header -->
  <div class="table-header">
    <h2 class="table-title">Recent Activity</h2>
    <p class="table-subtitle">Latest actions across your platform</p>
  </div>

  <!-- Loading State -->
  <ng-container *ngIf="loading(); else contentTemplate">
    <div class="table-loading">
      <app-loading-spinner message="Loading activities..." size="small" />
    </div>
  </ng-container>

  <!-- Error State -->
  <ng-container *ngIf="error(); else contentTemplate">
    <div class="table-error">
      <app-empty-state
        icon="error_outline"
        title="Failed to load activities"
        message="There was an error loading the recent activity table."
        size="small"
      />
    </div>
  </ng-container>

  <!-- Table Content -->
  <ng-template #contentTemplate>
    <ng-container *ngIf="hasData(); else emptyState">
      <div class="table-container">
        <table
          mat-table
          [dataSource]="activities()"
          class="activity-table"
          multiTemplateDataRows
        >
          <!-- Type Column -->
          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef class="type-column">Type</th>
            <td mat-cell *matCellDef="let activity" class="type-column">
              <div class="activity-type">
                <mat-icon
                  class="type-icon"
                  [style.color]="getActivityColor(activity.type)"
                >
                  {{ getActivityIcon(activity.type) }}
                </mat-icon>
              </div>
            </td>
          </ng-container>

          <!-- Description Column -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef class="description-column">
              Description
            </th>
            <td mat-cell *matCellDef="let activity" class="description-column">
              <span class="activity-description">{{ activity.description }}</span>
              <ng-container *ngIf="activity.target">
                <span class="activity-target"> → {{ activity.target.name }}</span>
              </ng-container>
            </td>
          </ng-container>

          <!-- Actor Column -->
          <ng-container matColumnDef="actor">
            <th mat-header-cell *matHeaderCellDef class="actor-column">Actor</th>
            <td mat-cell *matCellDef="let activity" class="actor-column">
              <div class="activity-actor">
                <img
                  *ngIf="activity.actor.avatar"
                  [src]="activity.actor.avatar"
                  [alt]="activity.actor.name"
                  class="actor-avatar"
                />
                <span class="actor-name">{{ activity.actor.name }}</span>
              </div>
            </td>
          </ng-container>

          <!-- Timestamp Column -->
          <ng-container matColumnDef="timestamp">
            <th mat-header-cell *matHeaderCellDef class="timestamp-column">
              Time
            </th>
            <td mat-cell *matCellDef="let activity" class="timestamp-column">
              <span class="activity-time">
                {{ activity.timestamp | relativeTime }}
              </span>
            </td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef class="status-column">
              Status
            </th>
            <td mat-cell *matCellDef="let activity" class="status-column">
              <ng-container *ngIf="activity.status">
                <mat-icon
                  class="status-icon"
                  [style.color]="getStatusColor(activity.status)"
                >
                  {{ getStatusIcon(activity.status) }}
                </mat-icon>
              </ng-container>
            </td>
          </ng-container>

          <!-- Header Row -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

          <!-- Data Rows -->
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
            class="activity-row"
            (click)="onRowClick(row)"
            tabindex="0"
            (keydown.enter)="onRowClick(row)"
            role="button"
            [attr.aria-label]="`${row.description} by ${row.actor.name}, ${row.timestamp | relativeTime}`"
          ></tr>
        </table>

        <!-- Paginator -->
        <mat-paginator
          [length]="total()"
          [pageIndex]="pageIndex()"
          [pageSize]="pageSize()"
          [pageSizeOptions]="[5, 10, 25, 50]"
          showFirstLastButtons
          (page)="onPageChange($event)"
          aria-label="Select page"
        />
      </div>
    </ng-container>
  </ng-template>

  <!-- Empty State -->
  <ng-template #emptyState>
    <div class="table-empty">
      <app-empty-state
        icon="list_alt"
        title="No recent activity"
        message="Activity will appear here once users start interacting with your platform."
        size="small"
      />
    </div>
  </ng-template>
</div>
