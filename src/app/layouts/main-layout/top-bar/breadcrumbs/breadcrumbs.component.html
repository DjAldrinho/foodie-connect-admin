<nav
  class="breadcrumbs"
  aria-label="Navegación de migas de pan"
  *ngIf="breadcrumbs$ | async as breadcrumbs"
>
  <ol class="breadcrumb-list">
    @for (breadcrumb of breadcrumbs; track breadcrumb.path; let isLast = $last) {
      <li class="breadcrumb-item" [class.last]="isLast">
        @if (!isLast) {
          <a
            class="breadcrumb-link"
            [routerLink]="breadcrumb.path"
            [attr.aria-current]="null"
          >
            {{ breadcrumb.label }}
          </a>
        } @else {
          <span
            class="breadcrumb-current"
            [attr.aria-current]="'page'"
          >
            {{ breadcrumb.label }}
          </span>
        }

        @if (!isLast) {
          <mat-icon class="breadcrumb-separator" aria-hidden="true">
            chevron_right
          </mat-icon>
        }
      </li>
    }
  </ol>
</nav>
