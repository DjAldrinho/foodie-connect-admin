<div class="main-layout" [class.mobile]="isMobile()">
  <!-- Skip Navigation Link for Accessibility -->
  <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

  <!-- Sidebar -->
  <app-sidebar
    [open]="sidebarOpen"
    [mobile]="isMobile()"
    [collapsed]="!sidebarOpen && !isMobile()"
    (close)="closeSidebar()"
    role="complementary"
    aria-label="Menú de navegación principal"
  ></app-sidebar>

  <!-- Overlay for mobile sidebar -->
  @if (isMobile() && sidebarOpen) {
    <div
      class="sidebar-overlay"
      (click)="closeSidebar()"
      aria-hidden="true"
    ></div>
  }

  <!-- Main Content Area -->
  <div class="main-content" [class.sidebar-shifted]="sidebarOpen && !isMobile()">
    <!-- Top Bar -->
    <app-top-bar (menuToggle)="toggleSidebar()"></app-top-bar>

    <!-- Page Content -->
    <main id="main-content" class="page-content" role="main" tabindex="-1">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
