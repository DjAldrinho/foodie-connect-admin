<div class="input-wrapper" [class.has-error]="hasError()">
  @if (label()) {
    <label [for]="id" class="input-label">
      {{ label() }}
      @if (required()) {
        <span class="required-indicator" aria-hidden="true">*</span>
      }
    </label>
  }

  <div class="input-container">
    @if (prefixIcon()) {
      <mat-icon class="input-icon prefix-icon" aria-hidden="true">
        {{ prefixIcon() }}
      </mat-icon>
    }

    <input
      [id]="id"
      [type]="getEffectiveType()"
      [value]="value()"
      [placeholder]="placeholder()"
      [required]="required()"
      [disabled]="disabled()"
      [readonly]="readonly()"
      [attr.maxlength]="maxLength()"
      [attr.aria-invalid]="hasError()"
      [attr.aria-describedby]="hasError() ? 'error-' + id : ''"
      [attr.aria-required]="required()"
      (input)="onInput($event)"
      (blur)="onBlur()"
      class="input-field"
    />

    @if (type() === 'password') {
      <button
        type="button"
        class="password-toggle"
        (click)="togglePassword()"
        [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        [attr.aria-pressed]="showPassword"
      >
        <mat-icon>
          {{ showPassword ? 'visibility_off' : 'visibility' }}
        </mat-icon>
      </button>
    } @else if (suffixIcon()) {
      <button
        type="button"
        class="suffix-icon-btn"
        (click)="onSuffixIconClick()"
        [attr.aria-label]="suffixIcon()"
      >
        <mat-icon>{{ suffixIcon() }}</mat-icon>
      </button>
    }
  </div>

  @if (hasError()) {
    <p [id]="'error-' + id" class="input-error" role="alert">
      {{ error() }}
    </p>
  } @else if (helperText()) {
    <p class="input-helper">{{ helperText() }}</p>
  }

  @if (showCounter()) {
    <div class="character-counter" aria-live="polite">
      {{ getCharacterCount() }} / {{ maxLength() }}
    </div>
  }
</div>
